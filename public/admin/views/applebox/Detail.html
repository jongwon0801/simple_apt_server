<div ng-controller="AppleboxDetailCtrl">
  <!-- 상단 헤더는 동일 -->

  <!-- 본문 -->
  <div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
      <div class="col-lg-12">
        <div class="ibox float-e-margins">
          <div class="ibox-title">
            <h5>
              락커 등록
              <small>* JSON 붙여넣고 확인을 누르세요</small>
            </h5>
          </div>

          <div class="ibox-content">
            <!-- form 태그 수정 -->
            <form
              class="form-horizontal"
              ng-submit="formSubmit(); $event.preventDefault()"
              name="lockerForm"
            >
              <div class="form-group">
                <label class="col-sm-2 control-label">* JSON 데이터</label>
                <div class="col-sm-10">
                  <textarea
                    class="form-control"
                    rows="20"
                    ng-model="templates"
                  ></textarea>
                </div>
              </div>

              <div class="form-group">
                <div class="col-sm-6 col-sm-offset-2">
                  <!-- 버튼에 타입 명시 추가 -->
                  <button class="btn btn-primary" type="submit">확인</button>
                  <button class="btn btn-white" type="button" ng-click="back()">
                    취소
                  </button>
                </div>
              </div>
            </form>

            <!-- 결과 메시지 표시 부분 -->
            <div ng-if="resultMessage" class="alert alert-info m-t-sm">
              {{ resultMessage }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
